# The constitutional floor of the acceptance-contract workflow (PRD E1/E2/E3).
#
# The floor is enforced in clearly separated layers, each a distinct job so a
# reader can see at a glance WHICH layer is red:
#
#   floor enforcement (deterministic, self-contained, always green when honest):
#     1. Marker removal detection (base-vs-head). Fails a PR that removes a floor
#        marker or a gate invocation from a file that previously carried it. This
#        is NOT an unconditional grep: the markers land later in the marathon, so
#        an unconditional check would red every intermediate PR. Removal detection
#        arms itself the moment a marker is added and bites only on removal.
#     2. FLOOR.md four-clause integrity (unconditional -- FLOOR.md exists from the
#        PR that introduced this workflow onward).
#
#   floor self-anchor (E2, fail-closed on repo settings):
#     Query the live GitHub API and FAIL (fail-closed) if either floor check
#     (floor enforcement / floor self-anchor) is no longer required on the
#     default branch, or if branch protection cannot be read at all. Reading repo
#     settings needs admin:read, which the default GITHUB_TOKEN lacks -- provide
#     the FLOOR_ANCHOR_TOKEN secret (fine-grained PAT, "Administration: read").
#     This out-of-band maintainer step is itself part of the floor (FLOOR.md
#     clause iii); until it is done the anchor fails closed with the exact
#     commands needed, and its red is isolated to this job.
#     The floor.yml PATH LOCK (a push ruleset over this file) is DESCOPED per the
#     maintainer's PRD-E2 decision (2026-07-10): GitHub refuses push rulesets on
#     public, user-owned repos (HTTP 422, "Source public repos cannot have push
#     rules"). The anchor now WARNS about that documented capability gap rather
#     than failing on it -- see scripts/floor_anchor.py (PATH_LOCK_DESCOPED) and
#     docs/floor-anchor-proof.md (Honest-degrade note, E2).
#
#   canary suite (E3, semantic layer -- conditional):
#     Runs scripts/canaries/run_canaries.py, which drives the REAL gates against
#     the committed and per-run blind fixtures (no mocks). It is the expensive
#     semantic layer, so it runs only on PRs that touch the workflow skills or the
#     gate/canary code (skills/marathon/, skills/pr-review-merge/, commands/tm.md,
#     commands/issues.md, scripts/contract/, scripts/canaries/, tests/canaries/, and
#     floor.yml itself, so a change to the wiring re-runs the canaries) -- a `canary
#     path filter` job diffs the PR against its base and gates it. On a
#     non-touching PR the suite job is skipped (neutral, never blocks). On a
#     touching PR it retries ONCE on failure (a real infra/model flake is re-run)
#     and then stays red -- it is never auto-skipped. The deterministic internals
#     are additionally unit-tested by tests/contract/test_canary_harness.py in the
#     required `plugin contract pytest` job, so the pure-code path is covered even
#     on PRs that do not trigger this suite.
#
# The deterministic `floor enforcement` and `floor self-anchor` jobs are required
# status checks on the default branch (see docs/floor-anchor-proof.md), so neither
# can be silently disarmed. The `canary suite` is conditional (it cannot be a
# required check, since it must be skippable on non-touching PRs) and is enforced
# by always running when the gate code changes rather than by branch protection.
name: Floor

on:
  pull_request:

permissions:
  contents: read

jobs:
  floor:
    name: floor enforcement
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # full history so the merge-base is resolvable
          persist-credentials: false

      - name: Fetch the PR base branch
        run: git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"

      - name: Marker removal detection (base-vs-head)
        run: |
          BASE_SHA="$(git merge-base "origin/${{ github.base_ref }}" HEAD)"
          echo "merge-base: ${BASE_SHA}"
          python scripts/floor_check.py markers --base "${BASE_SHA}"

      - name: FLOOR.md four-clause integrity
        run: python scripts/floor_check.py clauses

      - name: Deterministic layer summary
        if: success()
        run: |
          {
            echo "## Floor enforcement (deterministic layer): PASS"
            echo ""
            echo "Marker-removal detection and FLOOR.md four-clause integrity both hold."
            echo "The repo-settings anchor is checked separately by the \`floor self-anchor\` job."
          } >> "$GITHUB_STEP_SUMMARY"

  self-anchor:
    name: floor self-anchor
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Self-anchor (floor still required + path restricted)
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          FLOOR_ANCHOR_TOKEN: ${{ secrets.FLOOR_ANCHOR_TOKEN }}
          FLOOR_CONTEXT: floor enforcement
          ANCHOR_CONTEXT: floor self-anchor
        run: python scripts/floor_anchor.py

  # ------------------------------------------------------------------------- #
  # Semantic layer (E3): the canary suite. Expensive, so gated to PRs that
  # touch the workflow skills or the gate/canary code. The path filter diffs the
  # PR against its merge-base with the base branch (the same base-vs-head
  # mechanism the deterministic layer uses -- no new third-party action), rather
  # than a workflow-level `paths:` trigger, because floor.yml must keep running
  # on ALL PRs for the two jobs above.
  canary-changes:
    name: canary path filter
    runs-on: ubuntu-latest
    outputs:
      run_canaries: ${{ steps.filter.outputs.run_canaries }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # full history so the merge-base is resolvable
          persist-credentials: false

      - name: Fetch the PR base branch
        run: git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"

      - name: Detect changes to workflow-skill / gate paths
        id: filter
        run: |
          BASE_SHA="$(git merge-base "origin/${{ github.base_ref }}" HEAD)"
          echo "merge-base: ${BASE_SHA}"
          # Paths that carry a floor obligation, drive the gates the canary suite
          # exercises, or wire the suite itself (floor.yml -- so a change to the
          # canary invocation re-runs the canaries and proves the wiring). This is
          # the file set FLOOR.md clause iii protects; keep the two in sync.
          if git diff --name-only "${BASE_SHA}" HEAD \
            | grep -qE '^(skills/marathon/|skills/pr-review-merge/|commands/tm\.md$|commands/issues\.md$|scripts/contract/|scripts/canaries/|tests/canaries/|\.github/workflows/floor\.yml$)'; then
            echo "run_canaries=true" >> "$GITHUB_OUTPUT"
            echo "Workflow-skill / gate paths changed: canary suite WILL run."
          else
            echo "run_canaries=false" >> "$GITHUB_OUTPUT"
            echo "No workflow-skill / gate paths changed: canary suite will be skipped."
          fi

  canary-suite:
    name: canary suite (semantic layer)
    needs: canary-changes
    if: needs.canary-changes.outputs.run_canaries == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      # The interactive fixtures need a JS runtime to drive them; without one the
      # harness reports criteria 1/2b as NOT-RUN and fails closed. ubuntu-latest
      # ships Node preinstalled (node:fs + node:vm only -- no npm install), so a
      # visible version print is enough to assert the runtime is present and fail
      # loudly here rather than let the harness NOT-RUN downstream.
      - name: Verify Node runtime for the interactive driver
        run: node --version

      # Semantic layer, E3 execution model: run the real-gate harness. Retry
      # ONCE on failure to absorb a genuine infra/model flake; if the second
      # attempt also fails the job stays RED. It is never auto-skipped -- a red
      # canary suite is re-run, not waved through.
      - name: Run the canary suite (retry once, then stay red)
        run: |
          set +e
          for attempt in 1 2; do
            echo "::group::canary suite attempt ${attempt} of 2"
            uv run python scripts/canaries/run_canaries.py
            status=$?
            echo "::endgroup::"
            if [ "${status}" -eq 0 ]; then
              echo "Canary suite green on attempt ${attempt}."
              exit 0
            fi
            echo "::warning::Canary suite failed on attempt ${attempt} (exit ${status})."
          done
          echo "::error::Canary suite red after 2 attempts (1 retry). Not auto-skipped -- re-run once the underlying cause is fixed."
          exit 1

      - name: Semantic layer summary
        if: success()
        run: |
          {
            echo "## Floor canary suite (semantic layer): PASS"
            echo ""
            echo "The real freeze / cold-exit / complete gates certified the committed"
            echo "and per-run blind fixtures. This job ran because the PR touched the"
            echo "workflow skills or the gate/canary code."
          } >> "$GITHUB_STEP_SUMMARY"
