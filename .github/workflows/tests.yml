name: Tests

# Runs the pytest suite for the /assess deterministic core.
# The core is intentionally deterministic - same input, same output - so
# CI failure means a real regression, not flake.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    name: skills/assess pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4

      - name: Run pytest
        run: uv run --with pytest pytest -v
        working-directory: skills/assess

  pipeline-tests:
    name: scripts/ pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4

      - name: Run pytest
        run: uv run --with pytest pytest -v
        working-directory: scripts
