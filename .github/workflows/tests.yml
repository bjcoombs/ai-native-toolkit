name: Tests

# Runs the pytest suite for the /assess deterministic core.
# The core is intentionally deterministic - same input, same output - so
# CI failure means a real regression, not flake.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    name: skills/assess pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0

      # The promissory-marker scan shells out to ripgrep; without it the scan
      # honestly degrades to "rg not on PATH" and its fixture tests cannot
      # exercise the detector. ubuntu-latest does not ship rg.
      - name: Install ripgrep
        run: sudo apt-get update -q && sudo apt-get install -y -q ripgrep

      - name: Run pytest
        run: uv run --with pytest pytest -v
        working-directory: skills/assess

  pipeline-tests:
    name: scripts/ pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0

      - name: Run pytest
        run: uv run --with pytest pytest -v
        working-directory: scripts

  contract-tests:
    name: plugin contract pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0

      - name: Run pytest
        run: uv run --with pytest pytest -v tests/

  lint:
    name: ruff + mypy gates
    runs-on: ubuntu-latest
    steps:
      # Read-only job: don't persist the checkout token for later steps
      # (defense-in-depth; the workflow already restricts permissions to
      # contents: read).
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0

      # Layer 3 complexity ratchet + pyflakes/pycodestyle gate (issue #77).
      # Config (threshold, exclusions, per-function noqa) lives in each
      # pyproject.toml so the gate is identical locally and in CI.
      - name: Ruff lint + complexity gate (skills/assess)
        run: uv run --with ruff ruff check .
        working-directory: skills/assess

      - name: Ruff lint + complexity gate (scripts)
        run: uv run --with ruff ruff check .
        working-directory: scripts

      # Layer 2 type gate (issue #79). Scoped to the deterministic core (lib/);
      # config in skills/assess/pyproject.toml selects the files and checks.
      - name: Mypy type gate (skills/assess deterministic core)
        run: uv run --with mypy mypy
        working-directory: skills/assess
