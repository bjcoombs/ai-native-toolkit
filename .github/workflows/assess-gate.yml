# This repo's own instance of the Assess Gate - and the action's self-test.
#
# Consumers run `uses: bjcoombs/ai-native-toolkit@v<version>` (an immutable
# release tag, visible to Dependabot). Here we run `uses: ./` instead: the
# action as it exists on THIS branch, so every PR that touches the action or
# the deterministic core exercises the real composite end-to-end before it
# ships. Warn-only contract as everywhere: only .assess/config.toml opt-ins
# can fail the check.
name: Assess Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  assess:
    name: AI-readiness regression gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0  # full history so the churn window is accurate
          persist-credentials: false  # nothing here pushes; don't leave a token in .git

      - name: Run the AI-readiness gate (this branch's action)
        uses: ./
        with:
          config: .assess/config.toml
