<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 880" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4575b4"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1100" height="880" fill="#ffffff"/>

  <!-- title -->
  <text x="40" y="42" font-size="22" font-weight="700" fill="#1a1a1a">Keyhole Readiness &#8212; structural legibility</text>
  <text x="40" y="64" font-size="13" fill="#777">Mock-up, illustrative only (not generated from real analysis). Circle-packing (Harrer) + hierarchical edge bundling &#183; colour-mode: complexity.</text>

  <!-- ============ PACKAGE / DIR CIRCLES (drawn first, as background) ============ -->
  <!-- skills/assess/scripts -->
  <circle cx="340" cy="395" r="252" fill="#f6f7fb" stroke="#b6bac6" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="340" y="168" font-size="13" font-style="italic" fill="#5b6170" text-anchor="middle">skills/assess/scripts/</text>
  <!-- lib/ nested -->
  <circle cx="300" cy="455" r="132" fill="#e9edf7" stroke="#b6bac6" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="300" y="345" font-size="12" font-style="italic" fill="#5b6170" text-anchor="middle">lib/</text>

  <!-- scripts/ build pipeline -->
  <circle cx="835" cy="255" r="152" fill="#f6f7fb" stroke="#b6bac6" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="835" y="118" font-size="13" font-style="italic" fill="#5b6170" text-anchor="middle">scripts/ (build pipeline)</text>

  <!-- docs/ island -->
  <circle cx="860" cy="585" r="132" fill="#f6f7fb" stroke="#b6bac6" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="860" y="470" font-size="13" font-style="italic" fill="#5b6170" text-anchor="middle">docs/</text>
  <text x="860" y="700" font-size="11.5" fill="#3a8a3a" text-anchor="middle" font-style="italic">island &#183; containment 1.0 &#183; fresh docs</text>

  <!-- ============ EDGES ============ -->
  <!-- internal cohesion within lib/ (good, faint steel) -->
  <path d="M255,435 Q295,405 335,420" fill="none" stroke="#4575b4" stroke-width="1.4" opacity="0.55"/>
  <path d="M255,435 Q310,475 360,485" fill="none" stroke="#4575b4" stroke-width="1.4" opacity="0.55"/>
  <path d="M335,420 Q340,465 315,505" fill="none" stroke="#4575b4" stroke-width="1.4" opacity="0.55"/>

  <!-- dependencies into lib (steel, arrowed) -->
  <path d="M452,460 Q360,475 290,438" fill="none" stroke="#4575b4" stroke-width="1.5" opacity="0.7" marker-end="url(#arrow)"/>
  <path d="M487,372 Q380,405 290,438" fill="none" stroke="#4575b4" stroke-width="1.5" opacity="0.7" marker-end="url(#arrow)"/>

  <!-- build pipeline internal dependency -->
  <path d="M795,228 Q830,245 858,262" fill="none" stroke="#4575b4" stroke-width="1.5" opacity="0.7" marker-end="url(#arrow)"/>

  <!-- FLAGGED hidden coupling: complexity-treemap.py <-> lib/doc_graph.py (duplicated EXCLUDE_DIRS) -->
  <path d="M465,268 C385,320 305,335 262,422" fill="none" stroke="#762a83" stroke-width="4" stroke-dasharray="9 5" opacity="0.9"/>

  <!-- ============ LEAVES (files), fill = complexity (OrRd) ============ -->
  <!-- lib leaves -->
  <circle cx="255" cy="435" r="34" fill="#fc8d59" stroke="#666" stroke-width="1"><title>lib/doc_graph.py &#8212; LOC 470, CCN 31 &#183; owns EXCLUDE_DIRS (shared by liveness, staleness)</title></circle>
  <text x="255" y="439" font-size="10" fill="#222" text-anchor="middle">doc_graph</text>

  <circle cx="335" cy="420" r="30" fill="#fdbb84" stroke="#666" stroke-width="1"><title>lib/treemap_render.py &#8212; LOC 360, CCN 19</title></circle>
  <text x="335" y="424" font-size="9.5" fill="#222" text-anchor="middle">treemap_render</text>

  <circle cx="362" cy="485" r="24" fill="#fdd49e" stroke="#666" stroke-width="1"><title>lib/git_churn.py &#8212; LOC 210, CCN 12</title></circle>
  <text x="362" y="489" font-size="9" fill="#222" text-anchor="middle">git_churn</text>

  <circle cx="270" cy="505" r="20" fill="#fee8c8" stroke="#666" stroke-width="1"><title>lib/assess_config.py &#8212; LOC 71, CCN 6</title></circle>
  <text x="270" y="508" font-size="8.5" fill="#222" text-anchor="middle">config</text>

  <circle cx="315" cy="505" r="18" fill="#fee8c8" stroke="#666" stroke-width="1"><title>lib/stats_diff.py &#8212; LOC 140, CCN 9</title></circle>
  <text x="315" y="508" font-size="8.5" fill="#222" text-anchor="middle">stats_diff</text>

  <!-- top-level scripts in skills/assess/scripts -->
  <circle cx="470" cy="250" r="46" fill="#b30000" stroke="#666" stroke-width="1"><title>complexity-treemap.py &#8212; LOC 640, CCN 67 &#183; duplicates EXCLUDE_DIRS &#183; doc is STALE</title></circle>
  <text x="470" y="247" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">complexity-</text>
  <text x="470" y="259" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">treemap.py</text>

  <circle cx="490" cy="362" r="33" fill="#fc8d59" stroke="#666" stroke-width="1"><title>doc-graph-svg.py &#8212; LOC 330, CCN 22</title></circle>
  <text x="490" y="366" font-size="9" fill="#222" text-anchor="middle">doc-graph-svg</text>

  <circle cx="452" cy="460" r="38" fill="#ef6548" stroke="#666" stroke-width="1"><title>assess_core.py &#8212; LOC 410, CCN 28 &#183; last 9 commits agent-authored &#183; no runtime liveness signal</title></circle>
  <text x="452" y="464" font-size="9.5" fill="#fff" text-anchor="middle">assess_core</text>

  <!-- build pipeline leaves -->
  <circle cx="795" cy="225" r="33" fill="#fdbb84" stroke="#666" stroke-width="1"><title>transform_skill.py &#8212; LOC 300, CCN 18</title></circle>
  <text x="795" y="229" font-size="9" fill="#222" text-anchor="middle">transform</text>

  <circle cx="862" cy="262" r="29" fill="#fdd49e" stroke="#666" stroke-width="1"><title>standalone_skill_config.py &#8212; LOC 210, CCN 7</title></circle>
  <text x="862" y="266" font-size="8.5" fill="#222" text-anchor="middle">config</text>

  <circle cx="792" cy="305" r="22" fill="#fee8c8" stroke="#666" stroke-width="1"><title>build-standalone-skills.sh &#8212; LOC 120</title></circle>
  <text x="792" y="308" font-size="8" fill="#222" text-anchor="middle">build.sh</text>

  <!-- docs leaves (uniform pale, fresh) -->
  <circle cx="882" cy="548" r="18" fill="#fff7ec" stroke="#888" stroke-width="1"><title>README.md &#183; fresh</title></circle>
  <circle cx="828" cy="565" r="16" fill="#fff7ec" stroke="#888" stroke-width="1"><title>SKILL.md (assess) &#183; fresh</title></circle>
  <circle cx="898" cy="592" r="14" fill="#fff7ec" stroke="#888" stroke-width="1"><title>SKILL.md (huddle) &#183; fresh</title></circle>
  <circle cx="838" cy="608" r="16" fill="#fff7ec" stroke="#888" stroke-width="1"><title>plans/*.md &#183; fresh</title></circle>
  <circle cx="888" cy="632" r="13" fill="#fff7ec" stroke="#888" stroke-width="1"><title>testing-a-branch.md &#183; fresh</title></circle>
  <circle cx="815" cy="612" r="12" fill="#fff7ec" stroke="#888" stroke-width="1"><title>deslop SKILL.md &#183; fresh</title></circle>

  <!-- ============ DANGER RINGS (drawn over leaves) ============ -->
  <!-- complex + stale doc (top priority): crimson dashed halo -->
  <circle cx="470" cy="250" r="54" fill="none" stroke="#d7301f" stroke-width="3" stroke-dasharray="6 4"/>
  <!-- agent-owned + liveness unverified: steel dashed ring -->
  <circle cx="452" cy="460" r="46" fill="none" stroke="#2c7fb8" stroke-width="2.5" stroke-dasharray="3 4"/>

  <!-- callout for the flagged coupling -->
  <rect x="300" y="312" width="250" height="34" rx="5" fill="#ffffff" stroke="#762a83" stroke-width="1" opacity="0.96"/>
  <text x="425" y="326" font-size="10.5" fill="#762a83" text-anchor="middle" font-weight="600">hidden coupling: EXCLUDE_DIRS duplicated</text>
  <text x="425" y="339" font-size="10" fill="#762a83" text-anchor="middle">looks modular, but a change bleeds across lib/</text>

  <!-- ============ LEGEND ============ -->
  <rect x="40" y="724" width="1020" height="140" rx="6" fill="#fafafa" stroke="#dddddd"/>
  <text x="58" y="748" font-size="13" font-weight="700" fill="#333">Legend</text>

  <!-- left column -->
  <circle cx="70" cy="772" r="6" fill="#cccccc" stroke="#888"/>
  <circle cx="92" cy="772" r="11" fill="#cccccc" stroke="#888"/>
  <text x="116" y="776" font-size="11.5" fill="#333">circle size = lines of code</text>

  <circle cx="64" cy="802" r="7" fill="#fee8c8" stroke="#888"/>
  <circle cx="82" cy="802" r="7" fill="#fdbb84" stroke="#888"/>
  <circle cx="100" cy="802" r="7" fill="#fc8d59" stroke="#888"/>
  <circle cx="118" cy="802" r="7" fill="#ef6548" stroke="#888"/>
  <circle cx="136" cy="802" r="7" fill="#d7301f" stroke="#888"/>
  <circle cx="154" cy="802" r="7" fill="#b30000" stroke="#888"/>
  <text x="172" y="806" font-size="11.5" fill="#333">fill = cyclomatic complexity (low &#8594; high)</text>

  <circle cx="70" cy="832" r="12" fill="#f0f0f0" stroke="#b6bac6" stroke-dasharray="4 3"/>
  <text x="116" y="836" font-size="11.5" fill="#333">faint dashed circle = package / directory (nesting = hierarchy)</text>

  <path d="M58,860 q14,-10 28,0" fill="none" stroke="#762a83" stroke-width="3" stroke-dasharray="6 4"/>
  <text x="116" y="864" font-size="11.5" fill="#333">purple dashed = change-coupling (co-change); crossing a boundary = a bleed</text>

  <!-- right column -->
  <line x1="585" y1="772" x2="625" y2="772" stroke="#4575b4" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="638" y="776" font-size="11.5" fill="#333">steel arrow = dependency (import)</text>

  <circle cx="602" cy="802" r="10" fill="#b30000" stroke="none"/>
  <circle cx="602" cy="802" r="14" fill="none" stroke="#d7301f" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="638" y="806" font-size="11.5" fill="#333">crimson halo = complex + stale doc (lying map &#183; top priority)</text>

  <circle cx="602" cy="832" r="11" fill="#ef6548" stroke="none"/>
  <circle cx="602" cy="832" r="15" fill="none" stroke="#2c7fb8" stroke-width="2.5" stroke-dasharray="3 4"/>
  <text x="638" y="836" font-size="11.5" fill="#333">steel dashed ring = agent-owned &amp; liveness-unverified (orphaned)</text>

  <text x="585" y="864" font-size="11.5" fill="#333" font-style="italic">island = a package with no coupling edges leaving it (e.g. docs/)</text>
</svg>
